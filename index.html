<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KASANE INTERLINK</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0f;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden}
  #app{font-family:'Share Tech Mono',monospace;background:#0a0a0f;color:#c8ffc8;width:100%;max-width:600px;padding:24px;position:relative;z-index:1}
  .title{font-size:11px;letter-spacing:4px;color:#4af;text-transform:uppercase;margin-bottom:4px}
  .subtitle{font-size:18px;font-weight:500;color:#fff;margin-bottom:20px;letter-spacing:1px}
  .terminal{background:#050508;border:0.5px solid #1a3a1a;border-radius:8px;padding:16px;margin-bottom:16px;min-height:80px}
  .line{font-size:13px;line-height:1.8;color:#a0e0a0}
  .line.dim{color:#4a7a4a}
  .line.bright{color:#c8ffc8}
  .line.highlight{color:#4af;font-weight:500}
  .ascii{font-size:11px;line-height:1.4;color:#4af;white-space:pre;margin:8px 0;overflow-x:auto}
  input{background:#0a0f1a;border:0.5px solid #1a3a4a;color:#c8ffc8;font-family:'Share Tech Mono',monospace;font-size:13px;padding:8px 12px;border-radius:8px;width:100%;outline:none;margin:8px 0}
  input:focus{border-color:#4af}
  .btn{background:transparent;border:0.5px solid #2a4a2a;color:#a0e0a0;font-family:'Share Tech Mono',monospace;font-size:12px;padding:6px 16px;border-radius:8px;cursor:pointer;margin:4px 4px 4px 0;transition:all .15s}
  .btn:hover{border-color:#4af;color:#4af}
  .btn.primary{border-color:#2a5a7a;color:#4af}
  .btn.primary:hover{background:#0a1a2a}
  .prog{display:flex;gap:4px;margin:8px 0}
  .pip{width:10px;height:10px;border-radius:50%;background:#1a3a1a;border:0.5px solid #2a5a2a;transition:all .3s}
  .pip.done{background:#4af;border-color:#4af}
  .score{font-size:11px;letter-spacing:2px}
  .divider{border:none;border-top:0.5px solid #1a2a1a;margin:12px 0}
  .tag{font-size:10px;padding:2px 6px;border-radius:8px;margin-right:4px}
  .tag.jp{background:#0a1a0a;color:#4a9a4a;border:0.5px solid #2a4a2a}
  .tag.ov{background:#0a0f1a;color:#4a7aaa;border:0.5px solid #1a2a4a}
  .blink{animation:blink 1s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .wrong{animation:shake .3s;border-color:#6a1a1a!important;}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
  .col-head{font-size:10px;letter-spacing:2px;margin-bottom:6px}
  .name-chip{font-size:12px;padding:5px 10px;border-radius:8px;border:0.5px solid;line-height:1.6;margin-bottom:5px;opacity:0;transform:translateY(4px);transition:opacity .3s,transform .3s}
  .name-chip.show{opacity:1;transform:translateY(0)}
  .chip-ov{border-color:#1a2a4a;color:#6a9aca;background:#0a0f1a}
  .chip-jp{border-color:#1a3a1a;color:#5aaa5a;background:#0a1a0a}
  .pearto-sprite{position:fixed;object-fit:contain;pointer-events:none;z-index:9999;display:none;image-rendering:auto;}
  #pearto-big{position:fixed;object-fit:contain;pointer-events:none;z-index:9998;display:none;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.85;}
  .die-text{font-size:64px;font-weight:500;color:#f00;text-align:center;margin:12px 0;letter-spacing:8px;animation:corrupt-die 0.15s infinite;}
  @keyframes corrupt-die{
    0%  {color:#f00;transform:translateX(0) skewX(0deg);opacity:1;text-shadow:2px 0 #0ff,-2px 0 #f0f}
    20% {color:#0ff;transform:translateX(-3px) skewX(-2deg);opacity:0.8;text-shadow:-2px 0 #f00,2px 0 #ff0}
    40% {color:#f0f;transform:translateX(3px) skewX(2deg);opacity:1;text-shadow:3px 0 #0ff,-3px 0 #f00}
    60% {color:#ff0;transform:translateX(-2px) skewX(0deg);opacity:0.6;text-shadow:-2px 0 #f0f,2px 0 #0ff}
    80% {color:#f00;transform:translateX(2px) skewX(-1deg);opacity:0.9;text-shadow:2px 0 #ff0,-2px 0 #0ff}
    100%{color:#f00;transform:translateX(0) skewX(0deg);opacity:1;text-shadow:2px 0 #0ff,-2px 0 #f0f}
  }
  .chaos-text{animation:chaos-glitch 0.1s infinite !important;display:inline-block;}
  @keyframes chaos-glitch{
    0%  {filter:none;transform:skewX(0deg) translateX(0);text-shadow:1px 0 #f00,-1px 0 #0ff}
    10% {filter:hue-rotate(90deg);transform:skewX(-3deg) translateX(2px);text-shadow:2px 0 #0ff,-2px 0 #f0f}
    20% {filter:invert(0.2);transform:skewX(2deg) translateX(-3px);text-shadow:-1px 0 #ff0,1px 0 #f00}
    30% {filter:hue-rotate(180deg);transform:skewX(0deg) translateX(1px);text-shadow:3px 0 #f0f,-3px 0 #0ff}
    40% {filter:none;transform:skewX(1deg) translateX(-1px);text-shadow:-2px 0 #f00,2px 0 #ff0}
    50% {filter:hue-rotate(270deg);transform:skewX(-2deg) translateX(3px);text-shadow:1px 0 #0ff,-1px 0 #f0f}
    60% {filter:invert(0.15);transform:skewX(3deg) translateX(-2px);text-shadow:2px 0 #ff0,-2px 0 #f00}
    70% {filter:none;transform:skewX(-1deg) translateX(0);text-shadow:-3px 0 #0ff,3px 0 #f0f}
    80% {filter:hue-rotate(45deg);transform:skewX(2deg) translateX(2px);text-shadow:1px 0 #f00,-1px 0 #ff0}
    90% {filter:invert(0.1);transform:skewX(-3deg) translateX(-1px);text-shadow:-1px 0 #f0f,1px 0 #0ff}
    100%{filter:none;transform:skewX(0deg) translateX(0);text-shadow:1px 0 #f00,-1px 0 #0ff}
  }
  .lang-toggle{display:flex;gap:8px;margin-bottom:16px}
  .lang-btn{font-size:11px;padding:4px 12px;border-radius:8px;border:0.5px solid #2a4a2a;color:#4a7a4a;background:transparent;font-family:'Share Tech Mono',monospace;cursor:pointer;transition:all .15s;letter-spacing:1px}
  .lang-btn.active{border-color:#4af;color:#4af;background:#0a0f1a}
  .lang-btn:hover{border-color:#4af;color:#4af}
</style>
</head>

// ── pearto chaos ─────────────────────────────────────────────────
let peartoActive=false;
let sprites=[];
let spawnTimers=[];
let bigRAF=null;
let bigStartTime=null;
const bigEl=document.getElementById('pearto-big');
const audioEl=document.getElementById('pearto-audio');

function randBetween(a,b){return a+Math.random()*(b-a);}

function createSprite(size,speedMult){
  const img=document.createElement('img');
  img.src=PEARTO_SRC;
  img.className='pearto-sprite';
  img.style.width=size+'px';
  img.style.height=size+'px';
  img.style.display='block';
  document.body.appendChild(img);
  const x=randBetween(0,window.innerWidth-size);
  const y=randBetween(0,window.innerHeight-size);
  const angle=Math.random()*Math.PI*2;
  const speed=randBetween(10,22)*speedMult;
  return {el:img,x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,size};
}

function tickSprites(){
  if(!peartoActive)return;
  sprites.forEach(s=>{
    s.x+=s.vx;s.y+=s.vy;
    const maxX=window.innerWidth-s.size;
    const maxY=window.innerHeight-s.size;
    if(s.x<0){s.x=0;s.vx=Math.abs(s.vx)+randBetween(-2,2);}
    if(s.x>maxX){s.x=maxX;s.vx=-(Math.abs(s.vx)+randBetween(-2,2));}
    if(s.y<0){s.y=0;s.vy=Math.abs(s.vy)+randBetween(-2,2);}
    if(s.y>maxY){s.y=maxY;s.vy=-(Math.abs(s.vy)+randBetween(-2,2));}
    if(Math.random()<0.02){
      s.vx*=1.4;s.vy*=1.4;
      const cap=45;
      if(Math.abs(s.vx)>cap)s.vx=cap*Math.sign(s.vx);
      if(Math.abs(s.vy)>cap)s.vy=cap*Math.sign(s.vy);
    }
    s.el.style.left=s.x+'px';
    s.el.style.top=s.y+'px';
  });
  if(bigStartTime!==null){
    const t=Math.min((Date.now()-bigStartTime)/10000,1);
    const sz=80+t*Math.min(window.innerWidth,window.innerHeight)*0.85;
    bigEl.style.width=sz+'px';
    bigEl.style.height=sz+'px';
  }
  bigRAF=requestAnimationFrame(tickSprites);
}

function startPearto(){
  peartoActive=true;
  sprites.push(createSprite(100,1));
  for(let i=1;i<=8;i++){
    const t=setTimeout(()=>{if(peartoActive)sprites.push(createSprite(randBetween(70,130),randBetween(0.7,1.8)));},i*2000);
    spawnTimers.push(t);
  }
  bigEl.style.display='block';
  bigEl.style.width='80px';
  bigEl.style.height='80px';
  bigStartTime=Date.now();
  audioEl.currentTime=0;
  audioEl.play().catch(()=>{});
  applyChaosToDom();
  tickSprites();
}

function stopPearto(){
  peartoActive=false;
  spawnTimers.forEach(t=>clearTimeout(t));
  spawnTimers=[];
  if(bigRAF)cancelAnimationFrame(bigRAF);
  bigRAF=null;bigStartTime=null;
  sprites.forEach(s=>s.el.remove());
  sprites=[];
  bigEl.style.display='none';
  bigEl.style.width='80px';
  bigEl.style.height='80px';
  audioEl.pause();
  audioEl.currentTime=0;
  removeChaosDom();
}

function applyChaosToDom(){
  document.querySelectorAll('.line,.title,.subtitle,input,.btn,.score,.die-text').forEach(el=>el.classList.add('chaos-text'));
}
function removeChaosDom(){
  document.querySelectorAll('.chaos-text').forEach(el=>el.classList.remove('chaos-text'));
}

function checkMatch(val,riddle){
  const norm=val.trim().toLowerCase().replace(/\s+/g,'');
  return riddle.answers.some(a=>a.replace(/\s+/g,'')===norm);
}
function checkEasterEgg(val,riddle){
  if(!riddle.easterEgg)return false;
  return val.trim().toLowerCase()===riddle.easterEgg.trigger;
}

    renderPips();
    if(peartoActive)applyChaosToDom();
    const inp=document.getElementById('ans-input');
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkAnswer();});
    setTimeout(()=>inp&&inp.focus(),50);
  } else if(state.phase==='reveal'){
    stopPearto();
    t.innerHTML=`<div class="line highlight">${L.revealTitle}</div><br><div class="line">${L.revealLine1}</div><div class="line">${L.revealLine2}</div>`;
    g.innerHTML=`
      <div class="cols" id="cols-wrap">
        <div><div class="col-head tag ov">${L.ovLabel}</div><div id="ov-col"></div></div>
        <div><div class="col-head tag jp">${L.jpLabel}</div><div id="jp-col"></div></div>
      </div>
      <br><div class="line dim blink">>>> ${L.revealComplete} <<<</div>`;
    ovSorted.forEach((name,i)=>{
      const d=document.createElement('div');
      d.className='name-chip chip-ov';d.textContent=name;
      document.getElementById('ov-col').appendChild(d);
      setTimeout(()=>d.classList.add('show'),i*80);
    });
    jpSorted.forEach((name,i)=>{
      const d=document.createElement('div');
      d.className='name-chip chip-jp';d.textContent=name;
      document.getElementById('jp-col').appendChild(d);
      setTimeout(()=>d.classList.add('show'),i*80);
    });
  }
}

function renderPips(){
  const p=document.getElementById('prog');if(!p)return;
  p.innerHTML='';
  LANG[currentLang].riddles.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='pip'+(state.solved.includes(i)?' done':'');
    p.appendChild(d);
  });
}

function checkAnswer(){
  const inp=document.getElementById('ans-input');if(!inp)return;
  const L=getLang();
  const r=L.riddles[state.step];
  const eggArea=document.getElementById('egg-area');

  // easter egg checks — always check both EN and JA triggers
  const enR=LANG.en.riddles[state.step];
  if(enR.easterEgg&&inp.value.trim().toLowerCase()===enR.easterEgg.trigger){
    inp.value='';
    if(enR.easterEgg.type==='ascii'&&eggArea){
      eggArea.innerHTML=`<div class="ascii">${enR.easterEgg.art}</div>`;
    } else if(enR.easterEgg.type==='pearto'){
      if(eggArea)eggArea.innerHTML=`<div class="die-text">${currentLang==='ja'?'死ね':'die'}</div>`;
      if(!peartoActive)startPearto();
    }
    return;
  }

  if(checkMatch(inp.value,r)){
    if(eggArea)eggArea.innerHTML='';
    if(peartoActive)stopPearto();
    state.solved.push(state.step);
    state.step++;
    const msg=document.getElementById('err-msg');
    if(msg){msg.style.color='#4af';msg.textContent=L.confirmed;}
    setTimeout(()=>{
      if(state.step>=L.riddles.length){state.phase='reveal';}
      render();
    },600);
  } else {
    inp.classList.add('wrong');
    const msg=document.getElementById('err-msg');
    if(msg){msg.style.color='#f88';msg.textContent=L.corrupted;}
    setTimeout(()=>{inp.classList.remove('wrong');inp.value='';},400);
  }
}

function boot(){
  const L=getLang();
  const t=document.getElementById('main-terminal');
  const g=document.getElementById('game-area');
  const lines=L.bootLines;
  let i=0;t.innerHTML='';g.innerHTML='';
  const iv=setInterval(()=>{
    if(i<lines.length){
      t.innerHTML+=`<div class="line ${i===lines.length-1?'highlight':'dim'}">${lines[i]||'&nbsp;'}</div>`;
      i++;
    } else {
      clearInterval(iv);
      g.innerHTML=`<button class="btn primary" onclick="startGame()">${L.beginBtn}</button>`;
    }
  },200);
}

function startGame(){state.phase='riddle';render();}
boot();
</script>
</body>
</html>
